<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign in — Kamod AI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      font-family: system-ui, sans-serif;
      color: #e5e5e5;
    }
    .card {
      width: 100%;
      max-width: 360px;
      padding: 2.5rem 2rem;
      background: #141414;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
    }
    h1 { font-size: 1.25rem; margin-bottom: 1.5rem; color: #fff; }
    label { display: block; font-size: .85rem; color: #999; margin-bottom: .4rem; }
    input[type="password"] {
      width: 100%;
      padding: .65rem .85rem;
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 8px;
      color: #fff;
      font-size: .95rem;
      outline: none;
    }
    input[type="password"]:focus { border-color: #555; }
    button {
      width: 100%;
      margin-top: 1.2rem;
      padding: .7rem;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 8px;
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #e5e5e5; }
    .error {
      margin-top: 1rem;
      padding: .6rem .85rem;
      background: #2d1010;
      border: 1px solid #5a1d1d;
      border-radius: 6px;
      font-size: .85rem;
      color: #f87171;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Kamod AI — Sign in</h1>
    <form method="POST">
      <label for="key">Access key</label>
      <input type="password" id="key" name="key" autofocus autocomplete="current-password" placeholder="Enter your APP_SECRET_KEY"/>
      <button type="submit">Sign in</button>
      {% if error %}
        <div class="error">{{ error }}</div>
      {% endif %}
    </form>
  </div>
</body>
</html>
